<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Nagano AI Works</title>

<style>
/* ====== 基本デザイン ====== */
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
  color: #333;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 20px;
  background: #1e88e5;
  color: white;
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

.hamburger {
  font-size: 30px;
  cursor: pointer;
  user-select: none;
}

.lang-switch button {
  margin-left: 5px;
  padding: 5px 10px;
  cursor: pointer;
}

section {
  padding: 40px 20px;
  text-align: center;
}

.download-btn {
  display: inline-block;
  padding: 12px 20px;
  background: #1e88e5;
  color: white;
  text-decoration: none;
  border-radius: 6px;
  font-size: 18px;
  margin-top: 20px;
}

/* ====== ガラス風フルスクリーンメニュー ====== */
#menu-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  backdrop-filter: blur(18px) saturate(180%);
  -webkit-backdrop-filter: blur(18px) saturate(180%);
  background: rgba(255, 255, 255, 0.15);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 35px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
  z-index: 999;
}

#menu-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

#menu-overlay a {
  color: white;
  font-size: 32px;
  text-decoration: none;
  font-weight: 600;
  letter-spacing: 1px;
  text-shadow: 0 0 8px rgba(0,0,0,0.4);
  transition: 0.2s;
}

#menu-overlay a:hover {
  transform: scale(1.08);
  opacity: 0.85;
}

/* ====== 広告枠 ====== */
#ad-box {
  margin-top: 40px;
  padding: 20px;
  background: rgba(255,255,255,0.6);
  border-radius: 12px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  text-align: center;
}

#ad-box p {
  font-size: 16px;
  margin-bottom: 15px;
  color: #333;
}

.ad-image {
  width: 100%;
  max-width: 728px;
  border-radius: 8px;
}
</style>

<script>
/* ====== 自動メニュー生成 ====== */
document.addEventListener("DOMContentLoaded", () => {
  const menuItems = [
    { ja: "ホーム", en: "Home", link: "index.html" },
    { ja: "ロードマップ", en: "Roadmap", link: "roadmap.html" },
    { ja: "利用規約", en: "Terms", link: "terms.html" },
    { ja: "プライバシー", en: "Privacy", link: "privacy.html" },
    { ja: "個人情報保護方針", en: "Personal Data", link: "personal-data.html" },
    { ja: "制作ブランド", en: "Brand", link: "company.html" }
  ];

  const navMenu = document.getElementById("nav-menu");

  menuItems.forEach(item => {
    const a = document.createElement("a");
    a.href = item.link;
    a.textContent = item.ja;
    a.setAttribute("data-lang-ja", item.ja);
    a.setAttribute("data-lang-en", item.en);
    navMenu.appendChild(a);
  });

  /* ====== メニュー開閉 ====== */
  const hamburger = document.getElementById("hamburger");
  const overlay = document.getElementById("menu-overlay");

  hamburger.addEventListener("click", () => {
    overlay.classList.toggle("open");
  });

  /* ====== 言語切替 ====== */
  const jaBtn = document.getElementById("lang-ja");
  const enBtn = document.getElementById("lang-en");

  function switchLang(lang) {
    document.querySelectorAll("[data-lang-ja]").forEach(el => {
      el.textContent = el.getAttribute(`data-lang-${lang}`);
    });
  }

  jaBtn.onclick = () => switchLang("ja");
  enBtn.onclick = () => switchLang("en");
});
</script>

</head>

<body>

<header>
  <div class="logo">Nagano AI Works</div>

  <div class="hamburger" id="hamburger">☰</div>

  <div class="lang-switch">
    <button id="lang-ja">日本語</button>
    <button id="lang-en">EN</button>
  </div>
</header>

<!-- ガラス風メニュー -->
<div id="menu-overlay">
  <nav id="nav-menu"></nav>
</div>

<section id="hero">
  <h1 data-lang-ja="ページが見つかりません"
      data-lang-en="Page Not Found">
      ページが見つかりません
  </h1>

  <p data-lang-ja="お探しのページは存在しないか、移動された可能性があります。"
     data-lang-en="The page you are looking for may have been moved or does not exist.">
     お探しのページは存在しないか、移動された可能性があります。
  </p>

  <a class="download-btn"
     href="index.html"
     data-lang-ja="ホームに戻る"
     data-lang-en="Return to Home">
     ホームに戻る
  </a>

  <!-- 広告枠 -->
  <div id="ad-box">
    <p data-lang-ja="【広告】ここに広告を表示できます"
       data-lang-en="[Ad] You can place an advertisement here">
       【広告】ここに広告を表示できます
    </p>

    <img src="https://via.placeholder.com/728x90?text=Your+Ad+Here"
         alt="広告"
         class="ad-image">
  </div>

</section>

</body>
</html>
