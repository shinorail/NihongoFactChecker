<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nihongo Fact Checker | Nagano AI Works</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">Nagano AI Works</div>
        <button class="menu-btn" onclick="toggleNav()">Menu</button>
    </header>

    <main class="container">
        <section class="glass-card" style="text-align: center;">
            <h1 style="background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: clamp(2.2rem, 8vw, 4rem);">Nihongo Fact Checker</h1>
            <p class="accent-text" style="font-size: 1.3rem;">日本語文章の事実チェックを、もっと簡単に。</p>
            <p style="margin-top: 2rem; text-align: left;">
                Nihongo Fact Checker は、日本語の文章を AI が解析し、事実性をチェックするアプリです。
                文章を入力するだけで内容の正確さを確認でき、レポートや自由研究、SNS 投稿など幅広く活用できます。
            </p>
        </section>

        <section class="glass-card">
            <h2>特徴</h2>
            <ul style="list-style: none; margin-top: 1.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <li>● AI による事実チェック</li>
                <li>● シンプルなデザイン</li>
                <li>● オフライン動作</li>
                <li>● 中学生でも使える UI</li>
            </ul>
        </section>

        <section class="glass-card" style="text-align: center;">
            <h2>ダウンロード</h2>
            <p style="margin-top: 1rem;">Windows 版を無料でダウンロードできます。</p>
            <a href="#" class="btn-main">Download Free</a>
        </section>
    </main>

    <script src="common.js"></script>
</body>
</html>
