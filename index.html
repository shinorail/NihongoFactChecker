<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nihongo Fact Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Nagano AI Works</div>
        <button class="menu-btn" onclick="toggleNav()">Menu</button>
    </header>

    <main class="container">
        <section class="glass-card">
            <h1 style="background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Nihongo Fact Checker</h1>
            <p style="font-size: 1.2rem; color: var(--accent);">日本語文章の事実チェックを、もっと簡単に。</p>
            <p style="margin-top: 2rem; line-height: 1.8;">
                Nihongo Fact Checker は、日本語の文章を AI が解析し、事実性をチェックするアプリです。<br>
                文章を入力するだけで、内容の正確さを確認できます。
            </p>
        </section>

        <section class="glass-card">
            <h2>ダウンロード</h2>
            <p style="margin-bottom: 2rem;">Windows 版を無料でダウンロードできます。</p>
            <a href="#" class="btn-primary">Download Free</a>
        </section>
    </main>

    <script src="common.js"></script>
</body>
</html>
