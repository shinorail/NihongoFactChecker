<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHINORAIL Utility</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="grid-container">
    <div class="feature-card" id="js-geo">
        <div class="card-inner">
            <span class="label">LOCATION</span>
            <div class="display-value" id="js-location-name">取得中...</div>
            <div class="sub-value" id="js-latlng">--.---- / --.----</div>
        </div>
    </div>

    <div class="feature-card" id="js-traffic">
        <div class="card-inner">
            <span class="label">TRAFFIC</span>
            <div class="traffic-list">
                <div class="item"><span>信越本線</span><span class="status ok">平常</span></div>
                <div class="item"><span>篠ノ井線</span><span class="status ok">平常</span></div>
                <div class="item"><span>北陸新幹線</span><span class="status ok">平常</span></div>
            </div>
        </div>
    </div>

    <div class="feature-card" id="js-day">
        <div class="card-inner">
            <span class="label">TODAY IS...</span>
            <div class="display-value small" id="js-anniversary">
                カセットテープの日<br>上野動物園開園記念日
            </div>
        </div>
    </div>

    </main>

<script src="script.js"></script>
</body>
</html>
